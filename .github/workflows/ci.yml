name: ci
on:
  push: { branches: [main] }
  pull_request:
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task ci
